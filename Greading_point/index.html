<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greading-point</title>
</head>
<body>
    <script>
        let marks = parseInt(prompt("Enter Your Marks:"));
        switch(true){
            case(marks>100):
            document.write("It's Invalid Marks!!!");
            break;

            case(marks>=80):
            document.write("A+");
            break;

            case(marks>=70):
            document.write("A");
            break;

            case(marks>=60):
            document.write("B");
            break;

            default:
            document.write("F")
        }
    </script>
</body>
</html>
