<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial</title>
</head>

<body>
    <script>
        let num =parseInt(prompt("Enter Yoyr Number:"));
        function myfactorial(num) {
            if(num<0)
            return "Not Possible";
            let result = 1;
            for (let i = 2; i <= num; i++) {
                result *= i;
            }
            return result;
        }
        document.write("The Factorial Number Is: "+ myfactorial(num));


    </script>
</body>

</html>
